<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Bridge Pile Tracker</title>

<!--

=============================================================

 account and is ready to deploy.
 
 To share: Upload this file to Netlify drop or any web host.

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b1224; color: #f1f5f9;
    padding: 14px 12px 40px; min-height: 100vh;
  }
  h1 { font-size: 18px; margin: 0 0 4px; color: #d4af37; text-align: center; letter-spacing: 0.5px; }
  .sub { text-align: center; font-size: 11px; color: #94a3b8; margin-bottom: 10px; }

  .sync {
    text-align: center; font-size: 10px; margin-bottom: 10px;
    padding: 4px 8px; border-radius: 12px; display: inline-block;
    background: #142040; border: 1px solid #1e3a5f;
    position: relative; left: 50%; transform: translateX(-50%);
  }
  .sync.ok { color: #4ade80; }
  .sync.err { color: #f87171; border-color: #7f1d1d; }
  .sync.loading { color: #eab308; }

  .name-row {
    display: flex; gap: 6px; margin-bottom: 12px;
  }
  .name-row input {
    flex: 1; background: #142040; border: 1px solid #1e3a5f;
    color: #f1f5f9; padding: 8px 10px; border-radius: 6px;
    font-size: 13px; outline: none;
  }
  .name-row input::placeholder { color: #64748b; }

  .dir {
    display: flex; justify-content: space-between;
    font-size: 10px; color: #94a3b8; padding: 0 4px; margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .dir span { color: #d4af37; font-weight: 600; }

  .summary {
    background: #142040; border: 1px solid #1e3a5f;
    border-radius: 10px; padding: 10px 12px; margin-bottom: 14px;
  }
  .bar-wrap { background: #0b1224; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .bar { height: 100%; background: linear-gradient(90deg,#d4af37,#f1c947); transition: width .3s ease; }
  .stats { display: flex; justify-content: space-between; font-size: 12px; color: #cbd5e1; }
  .stats b { color: #d4af37; font-size: 14px; }
  .last-update {
    text-align: center; font-size: 10px; color: #64748b; margin-top: 6px;
  }

  .legend {
    display: flex; gap: 14px; justify-content: center;
    margin-bottom: 14px; font-size: 10px; color: #cbd5e1;
  }
  .legend div { display: flex; align-items: center; gap: 4px; }
  .dot { width: 12px; height: 12px; border-radius: 3px; border: 1px solid #334155; }
  .dot.pending { background: #1e293b; }
  .dot.done { background: #22c55e; }

  .support {
    background: #142040; border: 1px solid #1e3a5f;
    border-radius: 10px; padding: 10px 10px 12px; margin-bottom: 10px;
  }
  .support-head {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .support-title { font-size: 14px; font-weight: 700; color: #f1f5f9; }
  .support-title.ab { color: #d4af37; }
  .support-count { font-size: 11px; color: #94a3b8; }
  .piles { display: grid; gap: 8px; margin: 0 auto; }
  .piles.g4 { grid-template-columns: repeat(2, 64px); width: max-content; }
  .piles.g6 { grid-template-columns: repeat(3, 64px); width: max-content; }
  .pile {
    aspect-ratio: 1 / 1; border-radius: 8px;
    border: 1.5px solid #334155; background: #1e293b;
    color: #94a3b8; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s; user-select: none;
    position: relative;
  }
  .pile:active { transform: scale(0.92); }
  .pile.done { background: #22c55e; border-color: #4ade80; color: #052e16; }
  .pile .tag {
    position: absolute; bottom: 2px; font-size: 7px;
    color: #052e16; opacity: 0.7; font-weight: 500;
    max-width: 58px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }

  .btn-row { display: flex; gap: 8px; margin-top: 18px; }
  .btn {
    flex: 1; background: transparent; border: 1px solid #475569;
    color: #94a3b8; padding: 10px; border-radius: 6px;
    font-size: 12px; cursor: pointer;
  }
  .btn:active { background: #142040; }
</style>

</head>
<body>

<h1>BRIDGE PILE TRACKER</h1>
<div class="sub">Limb–Mathasuliya Road &nbsp;·&nbsp; Tap pile to mark complete</div>

<div style="text-align:center;">
  <div class="sync loading" id="sync">⟳ Connecting...</div>
</div>

<div class="name-row">
  <input id="engName" type="text" placeholder="Your name (e.g. Ramesh)" />
</div>

<div class="dir">
  <div>A1 — <span>Limb</span></div>
  <div>A2 — <span>Chandrej</span></div>
</div>

<div class="summary">
  <div class="stats">
    <span>Total: <b id="total">0</b></span>
    <span>Completed: <b id="done">0</b></span>
    <span>Pending: <b id="pend">0</b></span>
  </div>
  <div class="bar-wrap"><div class="bar" id="bar" style="width:0%"></div></div>
  <div style="text-align:center; font-size:11px; margin-top:4px; color:#94a3b8;">
    <span id="pct">0</span>% complete
  </div>
  <div class="last-update" id="lastUpdate"></div>
</div>

<div class="legend">
  <div><div class="dot pending"></div>Pending</div>
  <div><div class="dot done"></div>Completed</div>
</div>

<div id="app"></div>

<div class="btn-row">
  <button class="btn" id="refreshBtn">↻ Refresh</button>
  <button class="btn" id="resetBtn">Reset All</button>
</div>

<script>
  // ========= CONFIG — CONFIGURED WITH YOUR CREDENTIALS =========
  const BIN_ID     = "69dd98e7aaba882197f75426";
  const MASTER_KEY = "$2a$10$w0bQZqKoLNQfO0OtCV2VU.YS.GvFy/IVXBE5SyjpD5RtV3xn/NCdS";
  // =====================================================

  const API = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
  const HEADERS = {
    "Content-Type": "application/json",
    "X-Master-Key": MASTER_KEY,
  };
  const POLL_MS = 5000;

  const supports = [
    { id: 'A1', label: 'Abutment A1 (Limb)', count: 6, isAb: true },
    ...Array.from({length:12}, (_,i)=>({ id:'P'+(i+1), label:'Pier P'+(i+1), count:4, isAb:false })),
    { id: 'A2', label: 'Abutment A2 (Chandrej)', count: 6, isAb: true },
  ];
  const LETTERS = ['A','B','C','D','E','F'];

  // state shape: { piles: { "P1-A": {done:true, by:"Ramesh", at:167...} }, updatedAt, updatedBy }
  let state = { piles: {}, updatedAt: null, updatedBy: null };
  let busy = false;

  const $ = id => document.getElementById(id);

  // restore name
  try {
    const n = localStorage.getItem('eng-name');
    if (n) $('engName').value = n;
  } catch(e){}
  $('engName').addEventListener('input', ()=>{
    try { localStorage.setItem('eng-name', $('engName').value.trim()); } catch(e){}
  });

  function setSync(cls, text) {
    const el = $('sync');
    el.className = 'sync ' + cls;
    el.textContent = text;
  }

  async function pull() {
    try {
      const r = await fetch(API + '/latest', { headers: HEADERS });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const j = await r.json();
      const rec = j.record || {};
      if (rec.piles) state = rec;
      else state = { piles: {}, updatedAt: null, updatedBy: null };
      setSync('ok', '● Synced');
      render();
    } catch(e) {
      setSync('err', '⚠ Offline — check config');
      render();
    }
  }

  async function push() {
    if (busy) return;
    busy = true;
    setSync('loading', '⟳ Saving...');
    try {
      const r = await fetch(API, {
        method: 'PUT',
        headers: HEADERS,
        body: JSON.stringify(state),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      setSync('ok', '● Synced');
    } catch(e) {
      setSync('err', '⚠ Save failed');
    } finally {
      busy = false;
    }
  }

  async function toggle(key) {
    const name = ($('engName').value || '').trim();
    if (!name) {
      alert('Please enter your name first (top of page)');
      $('engName').focus();
      return;
    }
    // pull latest first to minimise conflicts
    await pull();
    const cur = state.piles[key];
    if (cur && cur.done) {
      delete state.piles[key];
    } else {
      state.piles[key] = { done: true, by: name, at: Date.now() };
    }
    state.updatedAt = Date.now();
    state.updatedBy = name;
    render();
    await push();
  }

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  function render() {
    const app = $('app');
    let html = '';
    let total=0, done=0;
    supports.forEach(s => {
      let sDone=0;
      const grid = s.count===6 ? 'g6' : 'g4';
      let tiles = '';
      for (let i=0;i<s.count;i++){
        const letter = LETTERS[i];
        const k = s.id+'-'+letter;
        const p = state.piles[k];
        total++;
        const isDone = p && p.done;
        if (isDone){ done++; sDone++; }
        const tag = isDone && p.by ? `<div class="tag">${p.by}</div>` : '';
        tiles += `<div class="pile ${isDone?'done':''}" data-k="${k}">${letter}${tag}</div>`;
      }
      html += `
        <div class="support">
          <div class="support-head">
            <div class="support-title ${s.isAb?'ab':''}">${s.label}</div>
            <div class="support-count">${sDone}/${s.count}</div>
          </div>
          <div class="piles ${grid}">${tiles}</div>
        </div>`;
    });
    app.innerHTML = html;
    $('total').textContent = total;
    $('done').textContent = done;
    $('pend').textContent = total-done;
    const pct = total ? Math.round(done/total*100) : 0;
    $('pct').textContent = pct;
    $('bar').style.width = pct+'%';
    $('lastUpdate').textContent = state.updatedAt
      ? `Last update: ${fmtTime(state.updatedAt)}${state.updatedBy?' by '+state.updatedBy:''}`
      : '';
    document.querySelectorAll('.pile').forEach(el=>{
      el.addEventListener('click', ()=>toggle(el.dataset.k));
    });
  }

  $('refreshBtn').addEventListener('click', pull);
  $('resetBtn').addEventListener('click', async ()=>{
    const name = ($('engName').value || '').trim();
    if (!name) { alert('Enter your name first'); return; }
    if (!confirm('Reset ALL piles to pending? This affects everyone.')) return;
    state = { piles: {}, updatedAt: Date.now(), updatedBy: name };
    render();
    await push();
  });

  // initial + auto-poll
  pull();
  setInterval(()=>{ if (!busy && document.visibilityState==='visible') pull(); }, POLL_MS);
</script>

</body>
</html>
